<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0F1E">
  <meta name="description" content="Mobile-first trading ledger for tracking sales, purchases and payments">
  <title>Hisaab — Trader's Ledger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header" id="app-header">
      <div class="header-inner">
        <div class="header-left">
          <div class="app-logo">ह</div>
          <div>
            <div class="app-title">Hisaab</div>
            <div class="app-subtitle">Trader's Ledger</div>
          </div>
        </div>
        <div class="header-right" id="header-actions"></div>
      </div>
    </header>

    <main class="app-main" id="main-content"></main>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item" id="nav-dashboard" onclick="App.navigate('dashboard')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" id="nav-sales" onclick="App.navigate('sales')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Sales</span>
      </button>
      <button class="nav-item" id="nav-purchases" onclick="App.navigate('purchases')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Purchases</span>
      </button>
      <button class="nav-item" id="nav-reports" onclick="App.navigate('reports')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Reports</span>
      </button>
      <button class="nav-item" id="nav-masters" onclick="App.navigate('masters')">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        <span>Masters</span>
      </button>
    </nav>

    <button class="fab" id="fab" onclick="App.handleFab()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span class="fab-label" id="fab-label"></span>
    </button>
  </div>

  <!-- Sub-dialog (sits above main modal, for inline create flows) -->
  <div id="sub-dlg" style="display:none;position:fixed;inset:0;z-index:600;align-items:flex-end">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.65)" onclick="CB._closeSubDlg()"></div>
    <div id="sub-dlg-inner" style="position:relative;width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:75vh;overflow-y:auto;z-index:1"></div>
  </div>

  <!-- Modal Overlay + Sheet -->
  <div class="modal-overlay" id="modal-overlay" onclick="Modal.close()"></div>
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle-bar"></div>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <!-- App modules -->
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('ServiceWorker registered:', reg.scope);
        }).catch(err => {
          console.log('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
